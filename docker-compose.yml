version: "3.9"

services:
  auto-register:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen-auto-register
    env_file:
      - .env
    environment:
      AUTO_REGISTER_UI_MODE: web
      AUTO_REGISTER_HOST: 0.0.0.0
      AUTO_REGISTER_PORT: "18080"
      PYTHONUNBUFFERED: "1"
    ports:
      - "18080:18080"
    restart: unless-stopped
